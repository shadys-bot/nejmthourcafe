server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN.COM;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN.COM;

    root /var/www/nejmthourcafe;
    index index.html index.php;
    charset utf-8;

    # SSL — SPanel handles certs, adjust paths as needed
    ssl_certificate     /etc/ssl/certs/YOUR_DOMAIN.pem;
    ssl_certificate_key /etc/ssl/private/YOUR_DOMAIN.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # Static files — long cache
    location ~* \.(jpg|jpeg|png|webp|gif|svg|ico|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Block direct access to includes & config inside admin
    location ~* /admin/includes/ { deny all; return 403; }
    location ~* /admin/.*\.json$ { deny all; return 403; }

    # Block .json at root (served by JS fetch directly, nginx should allow)
    # menu.json is public — frontend reads it
    location = /menu.json {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # PHP — admin panel only
    location /admin/ {
        try_files $uri $uri/ =404;
        location ~ \.php$ {
            include        fastcgi_params;
            fastcgi_pass   unix:/run/php/php8.2-fpm.sock;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }

    # Block PHP everywhere else
    location ~ \.php$ { deny all; return 403; }

    # Main static site
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable directory listing
    autoindex off;

    # Logs
    access_log /var/log/nginx/nejmthourcafe.access.log;
    error_log  /var/log/nginx/nejmthourcafe.error.log;
}
